<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #start-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      font-family: sans-serif;
      text-align: center;
      padding: 0 20px;
    }

    #start-btn {
      padding: 15px 30px;
      font-size: 18px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <div id="start-screen">
    <p>Hướng camera vào tranh/ảnh Thánh Gióng để xem khoảnh khắc Gióng bay về trời bằng AR.</p>
    <button id="start-btn">Bắt đầu quét tranh</button>
  </div>

  <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: yes;"
    color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <!-- Thay thanhgiong.mp4 bằng tên file video Thánh Gióng thực tế của bạn -->
      <video id="giongVideo" src="./voi.mp4" loop="true" crossorigin="anonymous" playsinline muted></video>
    <a-assets>
      <!-- Video AR Thánh Gióng, preload để tải sẵn cho mượt hơn -->
      <video id="giongVideo" src="./voi.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline
        muted></video>
    </a-assets>
    <!-- Giả định targets.mind chỉ còn 1 ảnh marker Thánh Gióng ở index 0 -->
    <a-entity id="giongTarget" mindar-image-target="targetIndex: 0">
      <a-video src="#giongVideo" width="1" height="0.56" position="0 0 0"></a-video>
    </a-entity>

  </a-scene>

  <script>
    const startBtn = document.querySelector('#start-btn');
    const startScreen = document.querySelector('#start-screen');
    const sceneEl = document.querySelector('a-scene');

    const giongVideo = document.querySelector('#giongVideo');
    const giongTarget = document.querySelector('#giongTarget');

    startBtn.addEventListener('click', () => {
      startScreen.style.display = 'none';

      // "Làm nóng" video: tải và play một lần rồi pause để buffer sẵn
      try {
        giongVideo.load();
        const playPromise = giongVideo.play();
        if (playPromise !== undefined) {
          playPromise.then(() => {
            giongVideo.pause();
          }).catch(() => { });
        }
      } catch (e) { }

      sceneEl.systems["mindar-image-system"].start();
    });

    // Điều khiển video khi quét trúng tranh Thánh Gióng
    giongTarget.addEventListener("targetFound", () => { giongVideo.play(); });
    giongTarget.addEventListener("targetLost", () => { giongVideo.pause(); });
  </script>
</body>

</html>
