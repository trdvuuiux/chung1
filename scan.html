<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #0b3d2e, #020609 60%);
      color: #f5f5f5;
    }

    #start-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: radial-gradient(circle at top, rgba(14, 94, 68, 0.95), rgba(1, 10, 6, 0.98));
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 20px;
    }

    .start-panel {
      max-width: 420px;
      width: 100%;
      background: rgba(1, 12, 8, 0.9);
      border-radius: 24px;
      padding: 24px 22px 20px;
      box-shadow:
        0 18px 45px rgba(0, 0, 0, 0.65),
        0 0 0 1px rgba(255, 255, 255, 0.03);
      position: relative;
      overflow: hidden;
    }

    .start-panel::before {
      content: "";
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(circle at 10% 0%, rgba(255, 255, 255, 0.06) 0, transparent 60%),
        radial-gradient(circle at 100% 100%, rgba(40, 167, 69, 0.35) 0, transparent 55%);
      opacity: 0.9;
      pointer-events: none;
    }

    .start-inner {
      position: relative;
      z-index: 1;
    }

    .start-icon {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: linear-gradient(145deg, #28a745, #1b7a36);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
      box-shadow: 0 10px 25px rgba(12, 84, 40, 0.7);
      font-size: 34px;
    }

    .start-title {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 8px;
    }

    .start-subtitle {
      font-size: 0.95rem;
      opacity: 0.85;
      margin-bottom: 16px;
    }

    .start-tip {
      font-size: 0.9rem;
      opacity: 0.9;
      margin-bottom: 18px;
    }

    .start-note {
      margin-top: 12px;
      font-size: 0.8rem;
      opacity: 0.75;
    }

    #start-btn {
      padding: 15px 30px;
      font-size: 18px;
      background: linear-gradient(135deg, #28a745, #3bd879);
      color: white;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      margin-top: 15px;
      box-shadow: 0 10px 30px rgba(40, 167, 69, 0.7);
      transition: transform 0.15s ease-out, box-shadow 0.15s ease-out, background 0.15s ease-out;
      width: 100%;
      max-width: 260px;
    }

    #start-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 36px rgba(40, 167, 69, 0.85);
      background: linear-gradient(135deg, #32ce5a, #44e786);
    }

    #start-btn:active {
      transform: translateY(1px) scale(0.99);
      box-shadow: 0 6px 20px rgba(40, 167, 69, 0.6);
    }
  </style>
</head>

<body>

  <div id="start-screen">
    <div class="start-panel">
      <div class="start-inner">
        <div class="start-icon">🐘</div>
        <div class="start-title">Tranh Voi AR</div>
        <div class="start-subtitle">Khám phá hình ảnh AR từ bức tranh voi bạn vẽ.</div>
        <p class="start-tip">Hãy hướng camera vào bức tranh con voi để bắt đầu trải nghiệm.</p>
        <button id="start-btn">Bắt đầu trải nghiệm AR</button>
        <div class="start-note">Gợi ý: Đặt tranh ở nơi đủ sáng, giữ tranh nằm gọn trong khung hình và tránh rung tay để AR ổn định hơn.</div>
      </div>
    </div>
  </div>

  <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: yes;"
    color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <!-- Video AR Voi, preload để tải sẵn cho mượt hơn -->
      <video id="giongVideo" src="./voi.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline
        muted></video>
    </a-assets>
    <!-- Giả định targets.mind chỉ còn 1 ảnh marker tranh con voi ở index 0 -->
    <a-entity id="giongTarget" mindar-image-target="targetIndex: 0">
      <a-video src="#giongVideo" width="1" height="0.56" position="0 0 0"></a-video>
    </a-entity>

  </a-scene>

  <script>
    const startBtn = document.querySelector('#start-btn');
    const startScreen = document.querySelector('#start-screen');
    const sceneEl = document.querySelector('a-scene');

    const giongVideo = document.querySelector('#giongVideo');
    const giongTarget = document.querySelector('#giongTarget');

    startBtn.addEventListener('click', () => {
      startScreen.style.display = 'none';

      // "Làm nóng" video: tải và play một lần rồi pause để buffer sẵn
      try {
        giongVideo.load();
        const playPromise = giongVideo.play();
        if (playPromise !== undefined) {
          playPromise.then(() => {
            giongVideo.pause();
          }).catch(() => { });
        }
      } catch (e) { }

      sceneEl.systems["mindar-image-system"].start();
    });

    // Điều khiển video khi quét trúng tranh Thánh Gióng
    giongTarget.addEventListener("targetFound", () => { giongVideo.play(); });
    giongTarget.addEventListener("targetLost", () => { giongVideo.pause(); });
  </script>
</body>

</html>
